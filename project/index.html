<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="ImpactClass — Apprenez auprès des plus grands leaders africains. Plateforme de masterclasses entrepreneuriales en français." />
<title>ImpactClass — par Golden Impact</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; padding: 0; background: #0E0E0E; }
  #root { min-height: 100vh; }
  .ic-screen { min-height: 100vh; height: auto; overflow: visible; }

  /* === LANDING RESPONSIVE === */
  .hero-grid { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 56px; align-items: center; }
  .hero-visual { display: block; }
  .hero-h1 { font-size: 76px; line-height: 0.98; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); }
  .parcours-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .hero-wrap { padding: 72px 56px 24px; max-width: 1320px; margin: 0 auto; }
  .mobile-menu { display: none; }
  .nav-mobile-overlay { display: none; }

  /* Tablette */
  @media (max-width: 1024px) {
    .hero-grid { grid-template-columns: 1fr; gap: 40px; }
    .hero-visual { max-width: 500px; margin: 0 auto; }
    .hero-h1 { font-size: 56px; }
    .hero-wrap { padding: 48px 32px 24px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--hairline); }
    .stats-grid > div { background: var(--bg); }
    .parcours-grid { grid-template-columns: repeat(2, 1fr); }
    .catalogue-wrap { padding: 28px 32px 48px; }
    .tracks-grid { grid-template-columns: repeat(3, 1fr); }
    .course-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
  }

  /* Mobile */
  @media (max-width: 768px) {
    /* Nav mobile */
    .nav { padding: 14px 16px; position: relative; }
    .nav-mid { display: none; }
    .nav-right { gap: 8px; }
    .nav-right .btn-ghost { display: none; }
    .mobile-menu { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; background: rgba(255,255,255,0.05); border: 1px solid var(--hairline-2); border-radius: 6px; cursor: pointer; }

    /* Hero */
    .hero-wrap { padding: 32px 16px 16px; }
    .hero-grid { grid-template-columns: 1fr; gap: 32px; }
    .hero-visual { max-width: 100%; }
    .hero-h1 { font-size: 42px; line-height: 1.05; letter-spacing: -0.03em; }

    /* Stats */
    .stats-grid { grid-template-columns: repeat(2, 1fr); }

    /* Parcours */
    .parcours-grid { grid-template-columns: 1fr 1fr; gap: 8px; }

    /* Catalogue */
    .catalogue-wrap { padding: 20px 16px 48px; }
    .catalogue-header { flex-direction: column; align-items: flex-start; }
    .search-box { width: 100%; min-width: unset; }
    .tracks-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .track-btn { padding: 12px 10px; }
    .course-grid { grid-template-columns: 1fr; gap: 14px; }

    /* Announcement bar */
    .announce-bar { flex-wrap: wrap; text-align: center; padding: 10px 16px; font-size: 12px; }

    /* Pricing */
    .pricing-cards { grid-template-columns: 1fr !important; }
    .pricing-wrap { padding: 32px 16px !important; }

    /* Partners */
    .partners-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .partners-stats { grid-template-columns: 1fr !important; }
    .partners-hero { padding: 40px 16px 32px !important; }
    .partners-section { padding: 0 16px 40px !important; }
    .enterprise-strip { flex-direction: column !important; gap: 20px !important; padding: 24px 20px !important; }
    .temoignages-grid { grid-template-columns: 1fr !important; }
  }

  @media (max-width: 480px) {
    .hero-h1 { font-size: 34px; }
    .tracks-grid { grid-template-columns: 1fr 1fr; }
    .parcours-grid { grid-template-columns: 1fr 1fr; }
    .partners-grid { grid-template-columns: 1fr 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="router.jsx"></script>
<script type="text/babel" src="screens/shared.jsx"></script>
<script type="text/babel" src="screens/landing.jsx"></script>
<script type="text/babel" src="screens/catalogue.jsx"></script>
<script type="text/babel" src="screens/course.jsx"></script>
<script type="text/babel" src="screens/pricing.jsx"></script>
<script type="text/babel" src="screens/dashboard.jsx"></script>
<script type="text/babel" src="screens/partners.jsx"></script>

<script type="text/babel">
function MobileNav() {
  const { navigate, page } = useRouter();
  const [open, setOpen] = React.useState(false);
  const links = [
    { id: "catalogue",   label: "Cours"        },
    { id: "partenaires", label: "Partenaires"   },
    { id: "pricing",     label: "Tarifs"        },
    { id: "dashboard",   label: "Mon espace"    },
  ];
  return (
    <>
      {/* Hamburger button — injected in Navbar slot */}
      {open && (
        <div onClick={() => setOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 98, backdropFilter: "blur(4px)" }} />
      )}
      {open && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, background: "#131313", border: "1px solid var(--hairline)", borderRadius: "0 0 12px 12px", padding: "20px 20px 28px", zIndex: 99, boxShadow: "0 16px 40px rgba(0,0,0,0.6)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <Logo />
            <button onClick={() => setOpen(false)} style={{ background: "none", border: "none", color: "var(--text-2)", fontSize: 22, cursor: "pointer", lineHeight: 1 }}>×</button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {links.map(l => (
              <button key={l.id} onClick={() => { navigate(l.id); setOpen(false); }} style={{ background: page === l.id ? "rgba(245,200,0,0.08)" : "none", border: page === l.id ? "1px solid rgba(245,200,0,0.3)" : "1px solid transparent", borderRadius: 8, padding: "14px 16px", color: page === l.id ? "var(--gold)" : "var(--text-2)", fontSize: 15, fontWeight: 500, cursor: "pointer", textAlign: "left", fontFamily: "Inter" }}>
                {l.label}
              </button>
            ))}
          </div>
          <div style={{ marginTop: 20, display: "flex", flexDirection: "column", gap: 10 }}>
            <button className="btn btn-gold" style={{ width: "100%", padding: "14px" }} onClick={() => { navigate("pricing"); setOpen(false); }}>
              Commencer — 7j gratuits <Icon.ArrowRight size={14} color="#0A0A0A" />
            </button>
            <button className="btn btn-ghost" style={{ width: "100%", padding: "12px" }} onClick={() => { navigate("dashboard"); setOpen(false); }}>
              Se connecter
            </button>
          </div>
        </div>
      )}
      {/* Floating hamburger */}
      <button className="mobile-menu" onClick={() => setOpen(o => !o)} style={{ position: "fixed", top: 14, right: 16, zIndex: 97 }}>
        <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
          <rect y="0" width="18" height="2" rx="1" fill="white"/>
          <rect y="6" width="13" height="2" rx="1" fill="white"/>
          <rect y="12" width="18" height="2" rx="1" fill="white"/>
        </svg>
      </button>
    </>
  );
}

function App() {
  const { page } = useRouter();
  const pages = {
    landing:     <LandingHero />,
    catalogue:   <Catalogue />,
    course:      <CoursePage />,
    pricing:     <Pricing />,
    dashboard:   <Dashboard />,
    partenaires: <Partners />,
  };
  return (
    <div>
      <MobileNav />
      {pages[page] || <LandingHero />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <Router>
    <App />
  </Router>
);
</script>

</body>
</html>
